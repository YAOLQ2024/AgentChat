# 服务配置
server:
  env: "dev" # prod / test / dev
  host: "127.0.0.1"
  port: 7860
  name: "AgentChat" # 项目名称
  version: "2.5.0" # 服务版本号

# 数据库配置：MySQL (请根据实际配置更改 endpoint)
# 格式：mysql+pymysql://<user>:<password>@<host>:<port>/<database>
mysql:
  endpoint: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/agentchat" # 同步连接配置
  async_endpoint: "mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/agentchat" # 异步连接配置

# 缓存配置：Redis
redis:
  endpoint: "redis://redis:6379" # Redis 连接地址

# 多模型服务配置 (LLM、Embedding、Rerank)
multi_models:
  # 对话模型配置
  conversation_model:
    api_key: "${MIMO_API_KEY}"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5-pro"
  # 工具调用/Function Call 模型配置
  tool_call_model:
    api_key: "${MIMO_API_KEY}"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2-pro"
  # 复杂推理模型配置
  reasoning_model:
    api_key: "${MIMO_API_KEY}"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5-pro"
  # 文生图模型配置
  text2image:
    api_key: "${MIMO_API_KEY}"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5"
  # 多模态 (视觉) 模型配置
  qwen_vl:
    api_key: "${MIMO_API_KEY}"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5"

  # Embedding 模型配置 (用于向量化)
  embedding:
    api_key: "${SILICONFLOW_API_KEY}"
    base_url: "https://api.siliconflow.cn/v1/embedding"
    model_name: "Qwen/Qwen3-Embedding-8B"

  # Rerank 模型配置 (用于重排序召回结果)
  rerank:
    api_key: "${SILICONFLOW_API_KEY}"
    base_url: "https://api.siliconflow.cn/v1/rerank"
    model_name: "Qwen/Qwen3-Reranker-4B"


# 外部工具 (Tool) 配置
tools:
  # 高德地图天气 API 配置
  weather:
    api_key: "${WEATHER_API_KEY}"
    endpoint: "https://restapi.amap.com/v3/weather/weatherInfo?parameters"
  # Tavily 联网搜索 API 配置 (注意配额限制)
  tavily:
    api_key: "${TAVILY_API_KEY}"
  # SerpApi 上的 Google Search API 配置
  google:
    api_key: "${GOOGLE_SEARCH_API_KEY}"
  # 阿里云快递查询 API 配置
  delivery:
    api_key: "${DELIVERY_API_KEY}"
    endpoint: "https://qyexpress.market.alicloudapi.com/composite/queryexpress"
  # BoCha 联网搜索 API 配置
  bocha:
    api_key: "${BOCHA_API_KEY}"
    endpoint: "https://api.bochaai.com/v1/web-search"

# RAG (检索增强生成) 配置
rag:
  enable_summary: False # 是否对知识库片段进行摘要
  enable_elasticsearch: False # 是否启用 Elasticsearch 进行关键词搜索
  enable_ik_analyzer: False # 是否启用 Elasticsearch 的IK分词器

  retrival:
    top_k: 5  # 知识库召回的最大数量
    min_score: 0.2 # 知识库召回结果的最小相似度分数阈值

  split:
    chunk_size: 500 # 知识库文档分块的最大字符数
    overlap_size: 100 # 文档分块之间的重叠字符数

  # ES数据库配置，主要做关键词召回
  elasticsearch:
    hosts: "http://127.0.0.1:9200" # Elasticsearch 连接地址。如果 'enable_elasticsearch' 为 False，则不需要填写。

  # 向量数据库配置 (Vector DB)
  vector_db:
    host: "127.0.0.1"
    port: "19530"
    mode: "chroma" # 向量库模式: standalone (Milvus), lite (轻量Milvus), chroma (ChromaDB)

# 阿里云对象存储 OSS 配置
storage:
  mode: "minio" # or oss

  oss:
    access_key_id: "${OSS_ACCESS_KEY_ID}"
    access_key_secret: "${OSS_ACCESS_KEY_SECRET}"
    endpoint: "oss-cn-beijing.aliyuncs.com"
    bucket_name: "agentchat" # OSS 存储桶名称
    base_url: "https://agentchat.oss-cn-beijing.aliyuncs.com" # 访问基础 URL

  minio:
    access_key_id: "${MINIO_ROOT_USER}"
    access_key_secret: "${MINIO_ROOT_PASSWORD}"
    endpoint: "minio:9000"
    bucket_name: "agentchat" # minio 存储桶名称
    base_url: "http://127.0.0.1:9000/agentchat" # 访问基础 URL

# 默认配置 (如图标 URL, 资源链接)
default_config:
  mcp_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/mcp/mcp.png"
  tool_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/tools/default.png" # 工具默认图标 URL
  agent_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/tools/bot.png" # Agent 默认图标 URL
  mars_daily_url: "https://news.aibase.com/zh/news" # 外部新闻链接
  memory_collection_name: "memory" # 记忆存储的集合名称

# 扩展功能：微信配置 (不添加也可正常运行)
wechat_config:
  token: "${WECHAT_TOKEN}"
  app_id: "${WECHAT_APP_ID}"
  secret: "${WECHAT_SECRET}"

# 追踪工具 Langfuse 配置 (目前版本可能未应用)
langfuse:
  trace_name: "agentchat"
  host: "https://cloud.langfuse.com"
  public_key: "${LANGFUSE_PUBLIC_KEY}" # Langfuse 公钥
  secret_key: "${LANGFUSE_SECRET_KEY}" # Langfuse 私钥
  user_id: "${LANGFUSE_USER_ID}" # 用户 ID

# 接口白名单路径
whitelist_paths: ["/api/v1/mcp/*"]
